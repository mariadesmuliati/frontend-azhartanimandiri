<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ClusterToko Azhar Tani Mandiri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .login-bg {
            background-image: url('assets/img/logo_sistemClustering.png');
            background-size: cover;
            background-position: center;
        }
        /* Overlay Hijau Gelap Elegan */
        .overlay-green {
            background: linear-gradient(to bottom right, rgba(6, 78, 59, 0.7), rgba(2, 44, 34, 0.85));
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.5s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen bg-white flex items-stretch overflow-hidden">

    <div class="hidden lg:flex w-1/2 login-bg relative flex-col justify-center px-16 text-white">
        <div class="absolute inset-0 overlay-green backdrop-blur-[2px]"></div>
        
        <div class="relative z-10 fade-up">
            <div class="w-20 h-20 bg-white rounded-3xl mb-8 flex items-center justify-center shadow-2xl">
                <i class="fas fa-leaf text-emerald-600 text-3xl"></i>
            </div>
            <h1 class="text-5xl font-extrabold mb-4 tracking-tight leading-tight">
                ClusterToko<br>
                <span class="text-3xl font-light opacity-90 text-emerald-100">Azhar Tani Mandiri</span>
            </h1>
            <p class="text-lg opacity-90 mb-8 leading-relaxed max-w-md">
                Sistem analisis K-Means clustering untuk mengelompokkan produk penjualan.
            </p>
            <div class="flex flex-wrap gap-3">
                <span class="bg-white/10 backdrop-blur-md border border-white/20 px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider">K-Means Analysis</span>
                <span class="bg-white/10 backdrop-blur-md border border-white/20 px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider">Pengelompokkan</span>
            </div>
        </div>
    </div>

    <div class="flex-1 flex items-center justify-center p-8 bg-gray-50">
        <div class="w-full max-w-md fade-up" style="animation-delay: 0.2s;">
            
            <div class="bg-white rounded-[2.5rem] shadow-xl shadow-emerald-100/50 p-10 border border-gray-100">
                <div class="mb-10 text-center lg:text-left">
                    <h2 class="text-3xl font-black text-gray-900 mb-2">Masuk ke Sistem</h2>
                    <p class="text-gray-500 font-medium">Gunakan akun administrator Azhar Tani.</p>
                </div>

                <div id="alert-error" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-xl mb-6 font-medium"></div>

                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-black text-gray-400 uppercase tracking-[0.2em] mb-2 ml-1">Email Address</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                                <i class="fas fa-envelope"></i>
                            </span>
                            <input id="inp-email" type="email" placeholder="admin@azhartani.com"
                                class="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-100 focus:border-emerald-500 focus:bg-white rounded-2xl outline-none transition-all text-gray-800 font-medium">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-black text-gray-400 uppercase tracking-[0.2em] mb-2 ml-1">Secure Password</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                                <i class="fas fa-lock"></i>
                            </span>
                            <input id="inp-password" type="password" placeholder="••••••••"
                                class="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-100 focus:border-emerald-500 focus:bg-white rounded-2xl outline-none transition-all text-gray-800 font-medium">
                        </div>
                    </div>

                    <button id="btn-login" onclick="doLogin()"
                        class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-4 rounded-2xl transition-all shadow-lg shadow-emerald-200 flex items-center justify-center gap-3 active:scale-[0.98]">
                        Masuk Sekarang <i class="fas fa-arrow-right"></i>
                    </button>
                </div>

                <div class="mt-8 pt-8 border-t border-gray-50 text-center">
                    <p class="text-sm text-gray-400">
                        Default: <span class="text-emerald-600 font-bold">admin@azhartani.com</span>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/config.js"></script>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js'
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } 
            from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js'

        const app  = initializeApp(FIREBASE_CONFIG)
        const auth = getAuth(app)

        onAuthStateChanged(auth, user => {
            if (user) window.location.href = 'dashboard.html'
        })

        window.doLogin = async function() {
            const email    = document.getElementById('inp-email').value.trim()
            const password = document.getElementById('inp-password').value
            const btn      = document.getElementById('btn-login')
            const alertEl  = document.getElementById('alert-error')

            if (!email || !password) {
                alertEl.textContent = '⚠ Email dan password wajib diisi'
                alertEl.classList.remove('hidden')
                return
            }

            btn.innerHTML  = '<i class="fas fa-circle-notch fa-spin"></i> Memverifikasi...'
            btn.disabled   = true
            alertEl.classList.add('hidden')

            try {
                const cred  = await signInWithEmailAndPassword(auth, email, password)
                const token = await cred.user.getIdToken()
                localStorage.setItem('fb_token',    token)
                localStorage.setItem('user_email',  email)
                localStorage.setItem('user_nama',   'Administrator')
                window.location.href = 'dashboard.html'
            } catch(e) {
                alertEl.textContent = '⚠ Email atau password salah!'
                alertEl.classList.remove('hidden')
                btn.innerHTML = 'Masuk Sekarang <i class="fas fa-arrow-right"></i>'
                btn.disabled  = false
            }
        }

        document.getElementById('inp-password').addEventListener('keydown', e => { 
            if (e.key === 'Enter') window.doLogin() 
        })
    </script>
    <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      // Pastikan path-nya sesuai posisi sw.js kamu
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker berhasil didaftarkan!', reg))
        .catch(err => console.log('Gagal daftar SW:', err));
    });
  }
</script>
</body>
</html>
